name: Cleanup Old Vercel Deployments

on:
  push:
    branches:
      - main

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Keep only the 5 most recent deployments
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          echo "Fetching Vercel deployments..."
          
          RESPONSE=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&target=production")
          
          IDS_TO_DELETE=$(echo $RESPONSE | jq -r '.deployments | sort_by(.createdAt) | reverse | .[5:] | .[].uid')
          
          if [ -z "$IDS_TO_DELETE" ]; then
            echo "No old deployments to delete. You have 5 or fewer."
            exit 0
          fi

          for id in $IDS_TO_DELETE; do
            echo "Deleting deployment ID: $id..."
            curl -s -X DELETE -H "Authorization: Bearer $VERCEL_TOKEN" "https://api.vercel.com/v13/deployments/$id"
          done
          
          echo "Cleanup complete!"